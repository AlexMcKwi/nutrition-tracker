<html lang="fr">
<head>
<meta charset="UTF-8"/>

<title>NutriTrack</title>
<script>
const MANIFEST={name:"NutriTrack — Suivi Nutritionnel",short_name:"NutriTrack",start_url:"./",display:"standalone",background_color:"#0f1117",theme_color:"#4ade80",orientation:"portrait",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230f1117'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='110'%3E🥗%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"},{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230f1117'/%3E%3Ctext x='256' y='350' text-anchor='middle' font-size='300'%3E🥗%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]};
const b=new Blob([JSON.stringify(MANIFEST)],{type:'application/json'});
const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(b);document.head.appendChild(l);
</script>
<script>
if('serviceWorker'in navigator){
  const SW=`const CACHE='nutritrack-v2';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('anthropic.com'))return;
  e.respondWith(caches.open(CACHE).then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;}).catch(()=>c.match('/')))));
});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([SW],{type:'text/javascript'}))).catch(()=>{});
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

body{background:#0f1117;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#2a3050;border-radius:99px;}
textarea{resize:vertical;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fi{animation:fadeIn .2s ease forwards;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block;}

<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ── Tokens ─────────────────────────────────────────────────────────────────
const C={
  bg:"#0f1117",surface:"#181c27",card:"#1e2333",border:"#2a3050",
  accent:"#4ade80",accentDim:"#22c55e20",
  warn:"#fb923c",warnDim:"#fb923c20",
  blue:"#60a5fa",blueDim:"#3b82f620",
  purple:"#a78bfa",
  muted:"#64748b",text:"#e2e8f0",dim:"#94a3b8",
};
const GOALS={calories:2000,proteines:150,glucides:250,lipides:65};
const FIXED_MEALS=[
  {id:"breakfast",label:"Petit-déjeuner",icon:"🌅",time:"07:30"},
  {id:"lunch",    label:"Déjeuner",      icon:"☀️", time:"12:30"},
  {id:"dinner",   label:"Dîner",         icon:"🌙",time:"19:00"},
];

// ── Helpers ────────────────────────────────────────────────────────────────
const todayKey=()=>new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,9);
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const fmtDate=d=>new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
const round1=v=>Math.round(v*10)/10;

const defaultDay=()=>({meals:{breakfast:[],lunch:[],dinner:[]},snacks:[],steps:null,water:0,notes:""});

// ── Persist ────────────────────────────────────────────────────────────────
function usePersist(key,init){
  const [s,set]=useState(()=>{try{return JSON.parse(localStorage.getItem(key))??init();}catch{return init();}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(s));}catch{}},[key,s]);
  return[s,set];
}

// ── AI estimation ──────────────────────────────────────────────────────────
async function estimateNutrition(desc){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:200,
        system:`Expert nutrition. JSON uniquement, pas de markdown.
Format: {"calories":number,"proteines":number,"glucides":number,"lipides":number,"fibres":number}`,
        messages:[{role:"user",content:`Valeur nutritionnelle: "${desc}"`}]
      })
    });
    const d=await r.json();
    return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json?|```/g,"").trim());
  }catch{return{calories:0,proteines:0,glucides:0,lipides:0,fibres:0};}
}

// ── UI atoms ───────────────────────────────────────────────────────────────
function CalRing({consumed,goal}){
  const pct=clamp(consumed/goal,0,1);
  const r=40,cx=50,cy=50,circ=2*Math.PI*r;
  const over=consumed>goal;
  return(
    <svg viewBox="0 0 100 100" width={96} height={96}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth={9}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={over?C.warn:C.accent} strokeWidth={9}
        strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round" transform="rotate(-90 50 50)"
        style={{transition:"stroke-dasharray .5s ease"}}/>
      <text x={cx} y={cy-4} textAnchor="middle" fill={C.text} fontSize={15} fontWeight={700}>{consumed}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill={C.muted} fontSize={9}>/ {goal} kcal</text>
    </svg>
  );
}

function MacroBar({label,value,max,color}){
  const pct=clamp(value/max*100,0,100);
  return(
    <div style={{marginBottom:9}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.dim,marginBottom:3}}>
        <span>{label}</span>
        <span style={{color:value>max?C.warn:C.dim}}>{Math.round(value)}g / {max}g</span>
      </div>
      <div style={{height:5,background:C.border,borderRadius:99,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:99,transition:"width .4s"}}/>
      </div>
    </div>
  );
}

function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:"fixed",bottom:84,left:"50%",transform:"translateX(-50%)",
      background:C.accent,color:"#0f1117",padding:"9px 18px",borderRadius:12,
      fontWeight:700,fontSize:13,zIndex:999,boxShadow:"0 4px 20px #0008",whiteSpace:"nowrap"}}>
      {msg}
    </div>
  );
}

function Inp({value,onChange,placeholder,type="text",style={}}){
  return(
    <input type={type} value={value} onChange={onChange} placeholder={placeholder}
      style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
        color:C.text,fontSize:13,padding:"9px 12px",outline:"none",width:"100%",...style}}/>
  );
}

function Btn({onClick,children,color=C.accent,disabled,style={}}){
  return(
    <button onClick={onClick} disabled={disabled} style={{
      background:disabled?C.border:color,color:disabled?C.muted:"#0f1117",
      border:"none",borderRadius:10,padding:"9px 16px",fontWeight:700,
      cursor:disabled?"default":"pointer",fontSize:13,opacity:disabled?0.5:1,
      transition:"all .15s",...style
    }}>{children}</button>
  );
}

// ── Food item row ──────────────────────────────────────────────────────────
function FoodItem({item,onDelete}){
  return(
    <div className="fi" style={{display:"flex",alignItems:"center",gap:8,
      padding:"8px 10px",background:C.bg,borderRadius:10,marginBottom:5}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,color:C.text,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
        {item.loading
          ?<div style={{fontSize:11,color:C.muted}}>⏳ IA en cours…</div>
          :<div style={{fontSize:11,color:C.muted}}>
            {item.calories} kcal · P{Math.round(item.proteines)}g · G{Math.round(item.glucides)}g · L{Math.round(item.lipides)}g
          </div>}
      </div>
      <button onClick={onDelete} style={{background:"none",border:"none",color:C.muted,
        cursor:"pointer",fontSize:20,lineHeight:1,padding:"0 2px",flexShrink:0}}>×</button>
    </div>
  );
}

// ── Add food form — supports library picks ─────────────────────────────────
function AddFoodForm({onAdd, foodLib}){
  const [val,setVal]=useState("");
  const [qty,setQty]=useState("100");
  const [busy,setBusy]=useState(false);
  const [showLib,setShowLib]=useState(false);
  const ref=useRef();

  // filter library
  const suggestions=useMemo(()=>{
    if(!val.trim()||val.length<2)return[];
    const q=val.toLowerCase();
    return foodLib.filter(f=>f.name.toLowerCase().includes(q)).slice(0,5);
  },[val,foodLib]);

  const submitFree=async()=>{
    const name=val.trim();if(!name||busy)return;
    setBusy(true);setVal("");setQty("100");
    const tempId=uid();
    onAdd({id:tempId,name,calories:0,proteines:0,glucides:0,lipides:0,fibres:0,loading:true});
    const nutr=await estimateNutrition(name);
    onAdd({id:tempId,name,...nutr,loading:false,_replace:tempId});
    setBusy(false);ref.current?.focus();
  };

  const pickLib=(food)=>{
    const q=parseFloat(qty)||100;
    const factor=q/100;
    const name=`${food.name} (${q}${food.unit})`;
    onAdd({
      id:uid(),name,
      calories:Math.round(food.calories*factor),
      proteines:round1(food.proteines*factor),
      glucides:round1(food.glucides*factor),
      lipides:round1(food.lipides*factor),
      fibres:round1((food.fibres||0)*factor),
      loading:false,
    });
    setVal("");setQty("100");setShowLib(false);
  };

  return(
    <div style={{marginTop:10}}>
      {/* Search row */}
      <div style={{display:"flex",gap:6,marginBottom:suggestions.length?6:0}}>
        <input ref={ref} value={val} onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&!suggestions.length&&submitFree()}
          placeholder="Aliment ou description…"
          style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
            color:C.text,fontSize:13,padding:"9px 12px",outline:"none"}}/>
        <input type="number" value={qty} onChange={e=>setQty(e.target.value)}
          placeholder="g/ml"
          style={{width:64,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
            color:C.text,fontSize:13,padding:"9px 8px",outline:"none",textAlign:"center"}}/>
        <button onClick={submitFree} disabled={busy||!val.trim()} style={{
          background:busy?C.border:C.accent,color:busy?C.muted:"#0f1117",border:"none",
          borderRadius:10,padding:"9px 14px",fontWeight:800,cursor:"pointer",fontSize:16,
          opacity:!val.trim()?0.4:1}}>
          {busy?<span className="spin">⟳</span>:"+"}
        </button>
      </div>

      {/* Library suggestions */}
      {suggestions.length>0&&(
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:4}}>
          {suggestions.map(f=>(
            <div key={f.id} onClick={()=>pickLib(f)}
              style={{padding:"9px 12px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:13,color:C.text,fontWeight:500}}>{f.name}</div>
                <div style={{fontSize:11,color:C.muted}}>
                  pour {parseFloat(qty)||100}{f.unit} → {Math.round(f.calories*(parseFloat(qty)||100)/100)} kcal
                </div>
              </div>
              <span style={{fontSize:12,color:C.accent,fontWeight:700}}>✓ lib</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Meal / Snack cards ─────────────────────────────────────────────────────
function MealCard({meal,items,onAdd,onDelete,foodLib,defaultOpen=false}){
  const [open,setOpen]=useState(defaultOpen);
  const total=items.reduce((s,i)=>s+(i.calories||0),0);
  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:10,overflow:"hidden"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"13px 16px",cursor:"pointer",userSelect:"none"}}>
        <div style={{width:38,height:38,borderRadius:11,background:C.accentDim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>{meal.icon}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text}}>{meal.label}</div>
          <div style={{fontSize:11,color:C.muted}}>{meal.time} · {items.length} aliment{items.length!==1?"s":""} · <span style={{color:total>0?C.accent:C.muted}}>{total} kcal</span></div>
        </div>
        <span style={{color:C.muted,fontSize:18,transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}>⌄</span>
      </div>
      {open&&(
        <div className="fi" style={{padding:"0 14px 14px"}}>
          {items.map(item=><FoodItem key={item.id} item={item} onDelete={()=>onDelete(item.id)}/>)}
          <AddFoodForm onAdd={onAdd} foodLib={foodLib}/>
        </div>
      )}
    </div>
  );
}

function SnackCard({items,onAdd,onDelete,foodLib}){
  const [open,setOpen]=useState(false);
  const total=items.reduce((s,i)=>s+(i.calories||0),0);
  return(
    <div style={{background:C.card,border:`1px dashed ${C.warn}55`,borderRadius:14,marginBottom:10,overflow:"hidden"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"13px 16px",cursor:"pointer",userSelect:"none"}}>
        <div style={{width:38,height:38,borderRadius:11,background:C.warnDim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>🍎</div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:C.warn}}>Collations</div>
          <div style={{fontSize:11,color:C.muted}}>{items.length} collation{items.length!==1?"s":""} · <span style={{color:total>0?C.warn:C.muted}}>{total} kcal</span></div>
        </div>
        <span style={{color:C.muted,fontSize:18,transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}>⌄</span>
      </div>
      {open&&(
        <div className="fi" style={{padding:"0 14px 14px"}}>
          {items.map(item=><FoodItem key={item.id} item={item} onDelete={()=>onDelete(item.id)}/>)}
          <AddFoodForm onAdd={onAdd} foodLib={foodLib}/>
        </div>
      )}
    </div>
  );
}

// ── Water ──────────────────────────────────────────────────────────────────
function WaterTracker({water,onChange}){
  const MAX=8;
  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"13px 16px",marginBottom:10}}>
      <div style={{fontSize:13,fontWeight:700,color:C.blue,marginBottom:9}}>💧 Hydratation — {water}/{MAX} verres</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {Array.from({length:MAX}).map((_,i)=>(
          <button key={i} onClick={()=>onChange(i<water?i:i+1)} style={{
            width:36,height:36,borderRadius:10,fontSize:17,cursor:"pointer",
            background:i<water?C.blueDim:C.bg,border:`1px solid ${i<water?C.blue:C.border}`,transition:"all .15s"
          }}>💧</button>
        ))}
      </div>
    </div>
  );
}

// ── Steps panel (no Google Fit) ────────────────────────────────────────────
function StepsPanel({steps,onStepsChange}){
  const [input,setInput]=useState(steps??0);
  const [saved,setSaved]=useState(false);
  const goal=10000;
  const pct=clamp((steps??0)/goal*100,0,100);

  useEffect(()=>{setInput(steps??0);},[steps]);

  const save=()=>{
    const n=parseInt(input);
    if(!isNaN(n)&&n>=0){onStepsChange(n);setSaved(true);setTimeout(()=>setSaved(false),2000);}
  };

  return(
    <div className="fi">
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <div style={{width:38,height:38,borderRadius:11,background:C.blueDim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>🏃</div>
          <div>
            <div style={{fontWeight:700,color:C.blue,fontSize:14}}>Pas quotidiens</div>
            <div style={{fontSize:11,color:C.muted}}>Objectif : {goal.toLocaleString("fr-FR")} pas</div>
          </div>
        </div>

        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={{fontSize:44,fontWeight:800,color:(steps??0)>=goal?C.accent:C.blue,fontVariantNumeric:"tabular-nums",lineHeight:1}}>
            {(steps??0).toLocaleString("fr-FR")}
          </div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>
            {(steps??0)>=goal?"🎉 Objectif atteint !":goal-(steps??0)>0?`encore ${(goal-(steps??0)).toLocaleString("fr-FR")} pas`:"-"}
          </div>
        </div>

        <div style={{height:8,background:C.border,borderRadius:99,marginBottom:16,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",borderRadius:99,
            background:`linear-gradient(90deg,${C.blue},${C.purple})`,transition:"width .5s"}}/>
        </div>

        <div style={{display:"flex",gap:6}}>
          <input type="number" value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&save()}
            placeholder="Nombre de pas…"
            style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
              color:C.text,fontSize:14,padding:"10px 12px",outline:"none"}}/>
          <Btn onClick={save} color={saved?C.accent:C.blue} style={{color:"#fff",padding:"10px 18px"}}>
            {saved?"✓ OK":"Enregistrer"}
          </Btn>
        </div>
      </div>

      {(steps??0)>0&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
          <div style={{fontSize:12,color:C.muted,marginBottom:2}}>Estimation calories brûlées</div>
          <div style={{fontSize:24,fontWeight:800,color:C.accent}}>~{Math.round((steps??0)*0.04)} kcal</div>
          <div style={{fontSize:11,color:C.muted}}>≈ 0.04 kcal/pas (adulte moyen)</div>
        </div>
      )}
    </div>
  );
}

// ── Stats ──────────────────────────────────────────────────────────────────
function StatsTab({weekStats}){
  const maxCal=Math.max(...weekStats.map(d=>d.calories),GOALS.calories);
  return(
    <div className="fi">
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>🔥 Calories — 7 jours</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:12}}>Objectif : {GOALS.calories} kcal/j</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:4,height:110}}>
          {weekStats.map(({date,calories})=>{
            const h=Math.max(4,calories/maxCal*95);
            const isT=date===todayKey(),over=calories>GOALS.calories;
            return(
              <div key={date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{fontSize:9,color:C.muted,marginBottom:2,height:13}}>{calories>0?calories:""}</div>
                <div style={{width:"100%",height:`${h}px`,background:isT?C.accent:over?C.warn:C.blue,borderRadius:"4px 4px 0 0",opacity:calories>0?1:0.2}}/>
                <div style={{fontSize:9,marginTop:3,color:isT?C.accent:C.dim}}>
                  {isT?"Auj.":new Date(date+"T12:00").toLocaleDateString("fr-FR",{weekday:"short"}).slice(0,3)}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12}}>👟 Pas — 7 jours</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80}}>
          {weekStats.map(({date,steps})=>{
            const h=Math.max(3,clamp(steps/12000,0,1)*70);
            return(
              <div key={date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{width:"100%",height:`${h}px`,background:steps>=10000?C.accent:`linear-gradient(180deg,${C.blue},${C.purple})`,borderRadius:"4px 4px 0 0",opacity:steps>0?1:0.15}}/>
                <div style={{fontSize:9,marginTop:3,color:C.dim}}>
                  {date===todayKey()?"Auj.":new Date(date+"T12:00").toLocaleDateString("fr-FR",{weekday:"short"}).slice(0,3)}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12}}>📈 Moyennes hebdo</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {(()=>{
            const aC=weekStats.filter(d=>d.calories>0);
            const aS=weekStats.filter(d=>d.steps>0);
            const aW=weekStats.filter(d=>d.water>0);
            const avgC=aC.length?Math.round(aC.reduce((s,d)=>s+d.calories,0)/aC.length):0;
            const avgS=aS.length?Math.round(aS.reduce((s,d)=>s+d.steps,0)/aS.length):0;
            const avgW=aW.length?Math.round(aW.reduce((s,d)=>s+d.water,0)/aW.length):0;
            return[
              ["🔥","Calories moy.",avgC?avgC+" kcal":"—",avgC&&avgC<=GOALS.calories?C.accent:C.warn],
              ["👟","Pas moy.",avgS?avgS.toLocaleString("fr-FR"):"—",avgS>=10000?C.accent:C.blue],
              ["💧","Verres moy.",avgW?avgW+"/8":"—",avgW>=6?C.accent:C.blue],
              ["📅","Jours trackés",aC.length+"/7",aC.length>=5?C.accent:C.warn],
            ].map(([ico,lbl,val,col])=>(
              <div key={lbl} style={{background:C.surface,borderRadius:12,padding:"11px 13px"}}>
                <div style={{fontSize:18,marginBottom:3}}>{ico}</div>
                <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{lbl}</div>
                <div style={{fontSize:18,fontWeight:800,color:col}}>{val}</div>
              </div>
            ));
          })()}
        </div>
      </div>
    </div>
  );
}

// ── Food Library Tab ───────────────────────────────────────────────────────
const EMPTY_FOOD=()=>({id:uid(),name:"",unit:"g",calories:0,proteines:0,glucides:0,lipides:0,fibres:0});

function FoodLibTab({foodLib,setFoodLib}){
  const [editing,setEditing]=useState(null); // null | food object
  const [search,setSearch]=useState("");
  const [err,setErr]=useState("");
  const [tab,setTab]=useState("list"); // list | form
  const [aiQuery,setAiQuery]=useState("");
  const [aiLoading,setAiLoading]=useState(false);

  const filtered=useMemo(()=>{
    if(!search.trim())return foodLib;
    const q=search.toLowerCase();
    return foodLib.filter(f=>f.name.toLowerCase().includes(q));
  },[foodLib,search]);

  const startNew=()=>{setEditing(EMPTY_FOOD());setErr("");setTab("form");};
  const startEdit=(f)=>{setEditing({...f});setErr("");setTab("form");};

  const save=()=>{
    if(!editing.name.trim()){setErr("Le nom est requis.");return;}
    if(editing.calories<0||editing.proteines<0||editing.glucides<0||editing.lipides<0){setErr("Valeurs négatives non autorisées.");return;}
    setFoodLib(prev=>{
      const idx=prev.findIndex(f=>f.id===editing.id);
      if(idx===-1)return[...prev,editing];
      const next=[...prev];next[idx]=editing;return next;
    });
    setTab("list");setEditing(null);setErr("");
  };

  const del=(id)=>{
    if(!confirm("Supprimer cet aliment ?"))return;
    setFoodLib(prev=>prev.filter(f=>f.id!==id));
  };

  const field=(label,key,type="number",extra={})=>(
    <div style={{marginBottom:12}}>
      <div style={{fontSize:12,color:C.dim,marginBottom:4}}>{label}</div>
      <input type={type} value={editing[key]} placeholder={label}
        onChange={e=>{
          const v=type==="number"?parseFloat(e.target.value)||0:e.target.value;
          setEditing(p=>({...p,[key]:v}));
        }}
        style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
          color:C.text,fontSize:14,padding:"10px 12px",outline:"none",...extra}}/>
    </div>
  );

  // AI auto-fill
  const autoFill=async()=>{
    if(!aiQuery.trim())return;
    setAiLoading(true);
    const nutr=await estimateNutrition(aiQuery+" 100g");
    setEditing(p=>({...p,name:p.name||aiQuery,...nutr}));
    setAiLoading(false);
    setAiQuery("");
  };

  return(
    <div className="fi">
      {tab==="list"&&(
        <>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Rechercher un aliment…"
              style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
                color:C.text,fontSize:13,padding:"9px 12px",outline:"none"}}/>
            <Btn onClick={startNew} style={{flexShrink:0,whiteSpace:"nowrap"}}>+ Nouveau</Btn>
          </div>

          {filtered.length===0&&(
            <div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}>
              <div style={{fontSize:36,marginBottom:10}}>🍽️</div>
              <div style={{fontSize:14}}>
                {search?"Aucun résultat":"Bibliothèque vide"}
              </div>
              <div style={{fontSize:12,marginTop:6}}>
                {!search&&"Ajoutez vos aliments habituels pour les retrouver rapidement."}
              </div>
            </div>
          )}

          {filtered.map(f=>(
            <div key={f.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,
              padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>
                  Pour 100{f.unit} : {f.calories} kcal · P{f.proteines}g · G{f.glucides}g · L{f.lipides}g
                  {f.fibres>0?` · F${f.fibres}g`:""}
                </div>
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button onClick={()=>startEdit(f)} style={{background:C.blueDim,border:`1px solid ${C.blue}44`,
                  borderRadius:8,color:C.blue,padding:"5px 10px",fontSize:12,cursor:"pointer",fontWeight:600}}>✏️</button>
                <button onClick={()=>del(f.id)} style={{background:"#f8717122",border:"1px solid #f8717144",
                  borderRadius:8,color:"#f87171",padding:"5px 10px",fontSize:12,cursor:"pointer",fontWeight:600}}>🗑</button>
              </div>
            </div>
          ))}
        </>
      )}

      {tab==="form"&&editing&&(
        <>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <button onClick={()=>{setTab("list");setEditing(null);}} style={{
              background:C.card,border:`1px solid ${C.border}`,borderRadius:10,
              color:C.text,padding:"8px 12px",cursor:"pointer",fontSize:13}}>← Retour</button>
            <div style={{fontWeight:700,fontSize:15,color:C.text}}>
              {editing.name?editing.name:"Nouvel aliment"}
            </div>
          </div>

          {/* AI auto-fill */}
          <div style={{background:C.card,border:`1px solid ${C.accentDim}`,borderRadius:12,padding:14,marginBottom:16}}>
            <div style={{fontSize:12,color:C.accent,fontWeight:700,marginBottom:8}}>✨ Remplissage automatique par IA</div>
            <div style={{display:"flex",gap:6}}>
              <input value={aiQuery} onChange={e=>setAiQuery(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&autoFill()}
                placeholder="Ex : poulet rôti, riz basmati…"
                style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
                  color:C.text,fontSize:13,padding:"9px 12px",outline:"none"}}/>
              <Btn onClick={autoFill} disabled={aiLoading||!aiQuery.trim()} style={{whiteSpace:"nowrap"}}>
                {aiLoading?<span className="spin">⟳</span>:"Estimer"}
              </Btn>
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:6}}>Valeurs estimées pour 100g/ml. Vous pouvez les ajuster.</div>
          </div>

          {/* Manual fields */}
          {field("Nom de l'aliment","name","text")}

          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:C.dim,marginBottom:4}}>Unité de mesure</div>
            <div style={{display:"flex",gap:8}}>
              {["g","ml"].map(u=>(
                <button key={u} onClick={()=>setEditing(p=>({...p,unit:u}))} style={{
                  flex:1,padding:"9px 0",borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:700,
                  background:editing.unit===u?C.accent:C.surface,
                  color:editing.unit===u?"#0f1117":C.muted,
                  border:`1px solid ${editing.unit===u?C.accent:C.border}`
                }}>{u}</button>
              ))}
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:4}}>Valeurs ci-dessous pour 100{editing.unit}</div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div>
              <div style={{fontSize:12,color:C.dim,marginBottom:4}}>Calories (kcal)</div>
              <input type="number" value={editing.calories} min={0}
                onChange={e=>setEditing(p=>({...p,calories:parseFloat(e.target.value)||0}))}
                style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
                  color:C.text,fontSize:14,padding:"10px 12px",outline:"none"}}/>
            </div>
            <div>
              <div style={{fontSize:12,color:C.dim,marginBottom:4}}>Protéines (g)</div>
              <input type="number" value={editing.proteines} min={0}
                onChange={e=>setEditing(p=>({...p,proteines:parseFloat(e.target.value)||0}))}
                style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
                  color:C.text,fontSize:14,padding:"10px 12px",outline:"none"}}/>
            </div>
            <div>
              <div style={{fontSize:12,color:C.dim,marginBottom:4}}>Glucides (g)</div>
              <input type="number" value={editing.glucides} min={0}
                onChange={e=>setEditing(p=>({...p,glucides:parseFloat(e.target.value)||0}))}
                style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
                  color:C.text,fontSize:14,padding:"10px 12px",outline:"none"}}/>
            </div>
            <div>
              <div style={{fontSize:12,color:C.dim,marginBottom:4}}>Lipides (g)</div>
              <input type="number" value={editing.lipides} min={0}
                onChange={e=>setEditing(p=>({...p,lipides:parseFloat(e.target.value)||0}))}
                style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
                  color:C.text,fontSize:14,padding:"10px 12px",outline:"none"}}/>
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <div style={{fontSize:12,color:C.dim,marginBottom:4}}>Fibres (g) — optionnel</div>
              <input type="number" value={editing.fibres||0} min={0}
                onChange={e=>setEditing(p=>({...p,fibres:parseFloat(e.target.value)||0}))}
                style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,
                  color:C.text,fontSize:14,padding:"10px 12px",outline:"none"}}/>
            </div>
          </div>

          {err&&<div style={{color:"#f87171",fontSize:12,marginTop:10}}>{err}</div>}

          <Btn onClick={save} style={{width:"100%",marginTop:16,padding:"12px 0",fontSize:14}}>
            💾 Enregistrer
          </Btn>
        </>
      )}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const dayKeys=Array.from({length:14},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-i);
    return d.toISOString().slice(0,10);
  }).reverse();

  const [selectedDate,setSelectedDate]=useState(todayKey());
  const [allDays,setAllDays]=usePersist("nt_days_v4",()=>({}));
  const [foodLib,setFoodLib]=usePersist("nt_foodlib_v1",()=>[]);
  const [tab,setTab]=useState("journal");
  const [toast,setToast]=useState(null);

  const dayData=allDays[selectedDate]??defaultDay();
  const isToday=selectedDate===todayKey();

  const updateDay=useCallback((fn)=>{
    setAllDays(prev=>{
      const cur=prev[selectedDate]??defaultDay();
      return{...prev,[selectedDate]:fn(cur)};
    });
  },[selectedDate]);

  const addFood=(slot,item)=>{
    updateDay(day=>{
      const list=slot==="snacks"?[...(day.snacks??[])]:
                 [...(day.meals[slot]??[])];
      if(item._replace){
        const i=list.findIndex(x=>x.id===item._replace);
        const copy={...item};delete copy._replace;
        if(i!==-1)list[i]=copy;else list.push(copy);
      }else list.push(item);
      if(slot==="snacks")return{...day,snacks:list};
      return{...day,meals:{...day.meals,[slot]:list}};
    });
  };

  const delFood=(slot,id)=>{
    updateDay(day=>{
      if(slot==="snacks")return{...day,snacks:day.snacks.filter(x=>x.id!==id)};
      return{...day,meals:{...day.meals,[slot]:day.meals[slot].filter(x=>x.id!==id)}};
    });
  };

  const allItems=[...Object.values(dayData.meals).flat(),...(dayData.snacks??[])];
  const totals=allItems.reduce((a,i)=>({
    calories:a.calories+(i.calories||0),
    proteines:a.proteines+(i.proteines||0),
    glucides:a.glucides+(i.glucides||0),
    lipides:a.lipides+(i.lipides||0),
  }),{calories:0,proteines:0,glucides:0,lipides:0});

  const weekStats=dayKeys.slice(-7).map(d=>{
    const dd=allDays[d]??defaultDay();
    const items=[...Object.values(dd.meals).flat(),...(dd.snacks??[])];
    return{date:d,calories:items.reduce((s,i)=>s+(i.calories||0),0),steps:dd.steps??0,water:dd.water??0};
  });

  const TABS=[
    ["journal","📋","Journal"],
    ["stats","📊","Stats"],
    ["steps","🏃","Activité"],
    ["foods","🥦","Aliments"],
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>

      {/* Header */}
      <div className="safe-top" style={{background:C.surface,borderBottom:`1px solid ${C.border}`,
        position:"sticky",top:0,zIndex:20}}>
        <div style={{maxWidth:520,margin:"0 auto",padding:"10px 16px 0"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div>
              <div style={{fontSize:19,fontWeight:800,letterSpacing:-0.5,color:C.accent}}>🥗 NutriTrack</div>
              <div style={{fontSize:11,color:C.muted}}>
                {isToday?"Aujourd'hui":fmtDate(selectedDate)}
                {!isToday&&<span style={{color:C.warn,marginLeft:6}}>✏️ passé</span>}
              </div>
            </div>
            <CalRing consumed={Math.round(totals.calories)} goal={GOALS.calories}/>
          </div>

          {/* Day scroller */}
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:10,
            scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
            {dayKeys.slice().reverse().map(d=>{
              const sel=d===selectedDate,tod=d===todayKey();
              return(
                <button key={d} onClick={()=>setSelectedDate(d)} style={{
                  flex:"0 0 auto",padding:"5px 11px",borderRadius:18,
                  background:sel?C.accent:C.card,border:`1px solid ${sel?C.accent:C.border}`,
                  color:sel?"#0f1117":tod?C.accent:C.dim,
                  fontWeight:sel||tod?700:400,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"
                }}>{tod?"Aujourd'hui":fmtDate(d)}</button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        <div className="safe-bot" style={{maxWidth:520,margin:"0 auto",padding:"14px 14px 0"}}>

          {/* Tab bar */}
          <div style={{display:"flex",gap:3,background:C.surface,borderRadius:13,padding:4,marginBottom:16}}>
            {TABS.map(([id,ico,lbl])=>(
              <button key={id} onClick={()=>setTab(id)} style={{
                flex:1,padding:"8px 0",borderRadius:10,border:"none",cursor:"pointer",
                background:tab===id?C.card:"none",
                color:tab===id?C.text:C.muted,
                fontSize:11,fontWeight:tab===id?700:400,
                boxShadow:tab===id?"0 1px 4px #0004":"none",
              }}>
                <div style={{fontSize:16}}>{ico}</div>
                <div>{lbl}</div>
              </button>
            ))}
          </div>

          {/* Journal */}
          {tab==="journal"&&(
            <div className="fi">
              {/* Macros */}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:C.dim,marginBottom:11}}>Macronutriments du jour</div>
                <MacroBar label="Protéines" value={Math.round(totals.proteines)} max={GOALS.proteines} color={C.blue}/>
                <MacroBar label="Glucides"  value={Math.round(totals.glucides)}  max={GOALS.glucides}  color={C.accent}/>
                <MacroBar label="Lipides"   value={Math.round(totals.lipides)}   max={GOALS.lipides}   color={C.warn}/>
                {(dayData.steps??0)>0&&(
                  <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`,
                    display:"flex",justifyContent:"space-between",fontSize:12,color:C.dim}}>
                    <span>👟 Pas</span>
                    <span style={{color:(dayData.steps??0)>=10000?C.accent:C.blue}}>
                      {(dayData.steps??0).toLocaleString("fr-FR")} / 10 000
                    </span>
                  </div>
                )}
              </div>

              {FIXED_MEALS.map(m=>(
                <MealCard key={m.id} meal={m}
                  items={dayData.meals[m.id]??[]}
                  onAdd={item=>addFood(m.id,item)}
                  onDelete={id=>delFood(m.id,id)}
                  foodLib={foodLib}
                  defaultOpen={m.id==="breakfast"&&isToday}/>
              ))}

              <SnackCard
                items={dayData.snacks??[]}
                onAdd={item=>addFood("snacks",item)}
                onDelete={id=>delFood("snacks",id)}
                foodLib={foodLib}/>

              <WaterTracker water={dayData.water??0}
                onChange={v=>updateDay(d=>({...d,water:v}))}/>

              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:C.dim,marginBottom:8}}>📝 Notes</div>
                <textarea value={dayData.notes??""} rows={3}
                  onChange={e=>updateDay(d=>({...d,notes:e.target.value}))}
                  placeholder="Ressenti, énergie, digestion…"
                  style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,
                    borderRadius:10,color:C.text,fontSize:13,padding:"9px 12px",
                    outline:"none",boxSizing:"border-box"}}/>
              </div>
            </div>
          )}

          {tab==="stats"&&<StatsTab weekStats={weekStats}/>}

          {tab==="steps"&&(
            <StepsPanel steps={dayData.steps}
              onStepsChange={v=>updateDay(d=>({...d,steps:v}))}/>
          )}

          {tab==="foods"&&(
            <FoodLibTab foodLib={foodLib} setFoodLib={setFoodLib}/>
          )}
        </div>
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:30,
        background:C.surface+"f0",backdropFilter:"blur(20px)",
        borderTop:`1px solid ${C.border}`,
        paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        <div style={{maxWidth:520,margin:"0 auto",display:"flex"}}>
          {TABS.map(([id,ico,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{
              flex:1,padding:"8px 0 6px",border:"none",background:"none",cursor:"pointer",
              display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
              <span style={{fontSize:20,filter:tab===id?"none":"grayscale(1)",opacity:tab===id?1:0.4}}>{ico}</span>
              <span style={{fontSize:10,color:tab===id?C.accent:C.muted,fontWeight:tab===id?700:400}}>{lbl}</span>
            </button>
          ))}
        </div>
      </div>

      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
